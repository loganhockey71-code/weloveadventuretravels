services:
  - type: web
    name: weloveadventuretravels-admin
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SESSION_SECRET
        sync: false
      - key: NETLIFY_AUTH_TOKEN
        sync: false
      - key: NETLIFY_SITE_ID
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: admin-data
      mountPath: /data
      sizeGB: 1
